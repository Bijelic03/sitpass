spring.application.name=sitpass

spring.datasource.url=jdbc:postgresql://localhost:5432/sitpass
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB

spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:sitpass-assets}

logging.level.org.hibernate.type.descriptor.java.spi=DEBUG
