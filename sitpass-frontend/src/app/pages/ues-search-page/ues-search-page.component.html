<div class="ues-shell">
  <div class="ues-header">
    <h2>UES Facility Search</h2>
    <p>Use quotes for phrase, `*` for prefix, and `~` for fuzzy. Empty filters show all gyms by default.</p>
  </div>

  <form [formGroup]="searchForm" (ngSubmit)="runSearch()" class="search-panel">
    <div class="field-grid">
      <input type="text" formControlName="name" placeholder="Name query">
      <input type="text" formControlName="description" placeholder="Description query">
      <input type="text" formControlName="pdfDescription" placeholder="PDF description query">

      <input type="number" formControlName="minReviews" placeholder="Min reviews">
      <input type="number" formControlName="maxReviews" placeholder="Max reviews">
      <select formControlName="operator">
        <option value="AND">AND operator</option>
        <option value="OR">OR operator</option>
      </select>

      <input type="number" step="0.1" formControlName="minAvgStaff" placeholder="Min avg staff">
      <input type="number" step="0.1" formControlName="maxAvgStaff" placeholder="Max avg staff">
      <input type="number" step="0.1" formControlName="minAvgEquipment" placeholder="Min avg equipment">

      <input type="number" step="0.1" formControlName="maxAvgEquipment" placeholder="Max avg equipment">
      <input type="number" step="0.1" formControlName="minAvgHygiene" placeholder="Min avg hygiene">
      <input type="number" step="0.1" formControlName="maxAvgHygiene" placeholder="Max avg hygiene">

      <input type="number" step="0.1" formControlName="minAvgSpace" placeholder="Min avg space">
      <input type="number" step="0.1" formControlName="maxAvgSpace" placeholder="Max avg space">
      <label class="checkbox-row">
        <input type="checkbox" formControlName="sortByNameAsc">
        Sort name ascending
      </label>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-search">Search</button>
      <button type="button" class="btn btn-reset" (click)="resetFilters()">Reset</button>
      <span class="result-count" *ngIf="!loading">Results: {{ results.length }}</span>
    </div>
  </form>

  <div *ngIf="loading" class="info">Searching...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="results-grid">
    <div *ngFor="let result of results" class="result-card">
      <div class="card-head">
        <h3>{{ result.name }}</h3>
        <button (click)="runMoreLikeThis(result.facilityId)" class="btn btn-secondary">More like this</button>
      </div>
      <p class="description">{{ result.description }}</p>
      <p class="summary" [innerHTML]="result.summary"></p>
      <a [href]="'/facilities/' + result.facilityId" class="open-link">Open facility</a>
    </div>
  </div>
</div>
